<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student result calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" type="text/css"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
    
    
    
</head>
<body>
   <div class="container">
    <h1>Student Result Calculator</h1>
    <div class="inputdiv">
    <input class="input" type="number" id="bangla" placeholder="Bangla Marks">
    <input class="input" type="number" id="english" placeholder="English Marks">
    <input class="input" type="number" id="math" placeholder="Math Marks">

    <button class="btn" >Calculate</button>

    <div class="resultdiv" >
        <h3 >Result: <span id="result"></span></h3>
    </div>
   
   </div>
</body>
<script src="script.js"></script>
</html>
