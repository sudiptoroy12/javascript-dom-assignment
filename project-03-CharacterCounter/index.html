<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" type="text/css"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
    
    
    
</head>
<body>
   <div class="container">
    <div>
     <h3>Character Counter</h3>
     <textarea name="text" id="text" placeholder="Write something...." rows="4"></textarea>
    </div>
   
   
    <div class="textdiv">
        <p class="para">Character count : <span class="subpara" id="character">0</span></p>
        <p class="para">Word count : <span class="subpara" id="word">0</span></p>
    
    </div>
   
   </div>
</body>
<script src="script.js"></script>
</html>
